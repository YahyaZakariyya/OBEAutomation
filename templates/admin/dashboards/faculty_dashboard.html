<div class="content">
    <div class="row mt-4" id="course-cards">
        <!-- Course cards will be dynamically inserted here -->
    </div>

    <div class="view-more mt-3">
        <a href="#">View All Courses</a>
    </div>

    <div class="row mt-4">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">CLO Performance Summary</div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="cloChart"></canvas>
                    </div>
                    <div class="view-more">
                        <a href="{% url 'faculty_result_view' %}">Detailed CLO Analysis</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Recent Activities</div>
                <div class="card-body">
                    <ul>
                        <li>Graded Assignment 3 (Data Science)</li>
                        <li>Added Quiz 2 (Web Development)</li>
                        <li>Updated CLO for Machine Learning</li>
                    </ul>
                    <div class="view-more">
                        <a href="#">View All Activities</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/api/dashboard/')  // Adjust the URL to match your API endpoint
            .then(response => response.json())
            .then(data => {
                // Update the dashboard with the fetched data
                document.getElementById('total_sections').innerText = data.total_sections;
                document.getElementById('active_sections').innerText = data.active_sections;

                // Dynamically create course cards
                const courseCardsContainer = document.getElementById('course-cards');
                data.course_details.forEach(course => {
                    const card = document.createElement('div');
                    card.className = 'col-md-4';
                    card.innerHTML = `
                        <div class="card">
                            <div class="card-header">Course: ${course.name}</div>
                            <div class="card-body">
                                <p>Semester: <strong>${course.semester}</strong></p>
                                <p>Batch: <strong>${course.batch}</strong></p>
                                <p>Assessments: <strong>${course.total_assessments}</strong></p>
                                <p>Students Enrolled: <strong>${course.enrolled_students}</strong></p>
                                <div class="view-more">
                                    <a href="#">View All Details</a>
                                </div>
                            </div>
                        </div>
                    `;
                    courseCardsContainer.appendChild(card);
                });
            })
            .catch(error => console.error('Error fetching dashboard data:', error));
    });
</script>
